<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 400px; min-height: 220px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117; color: #e6edf3;
      padding: 16px;
    }
    h1 {
      font-size: 15px; font-weight: 700;
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px; color: #58a6ff;
    }
    h1 .icon { font-size: 18px; }
    .status {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 12px; margin-bottom: 12px;
    }
    .status-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 3px 0; font-size: 12px;
    }
    .status-label { color: #8b949e; }
    .status-value { font-weight: 600; font-size: 12px; }
    .ok { color: #3fb950; }
    .err { color: #f85149; }
    .warn { color: #d29922; }
    .captchas {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 12px; margin-bottom: 12px;
    }
    .captcha-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0; border-bottom: 1px solid #21262d;
      font-size: 12px;
    }
    .captcha-item:last-child { border-bottom: none; }
    .captcha-type { font-weight: 500; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
    }
    .badge-pending { background: #d29922; color: #0d1117; }
    .badge-solving { background: #58a6ff; color: #0d1117; }
    .badge-solved { background: #3fb950; color: #0d1117; }
    .badge-failed { background: #f85149; color: #fff; }
    .actions { display: flex; gap: 8px; margin-bottom: 12px; }
    .btn {
      flex: 1; padding: 9px; border: 1px solid #30363d; border-radius: 6px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { border-color: #8b949e; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-primary { background: #238636; color: #fff; border-color: #238636; }
    .btn-primary:hover { background: #2ea043; }
    .btn-secondary { background: #21262d; color: #e6edf3; }
    .btn-danger { background: #da3633; color: #fff; border-color: #da3633; }
    .stats {
      display: flex; gap: 6px; margin-bottom: 12px;
    }
    .stat-box {
      flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      padding: 8px; text-align: center;
    }
    .stat-num { font-size: 20px; font-weight: 700; }
    .stat-label { font-size: 10px; color: #8b949e; text-transform: uppercase; }
    .settings {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 12px; margin-bottom: 12px;
    }
    .setting-item { margin-bottom: 10px; }
    .setting-item:last-child { margin-bottom: 0; }
    .setting-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; display: block; }
    .setting-input {
      width: 100%; padding: 7px; background: #0d1117; border: 1px solid #30363d;
      border-radius: 4px; color: #e6edf3; font-size: 12px;
    }
    .setting-input:focus { outline: none; border-color: #58a6ff; }
    .toggle-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 0; font-size: 12px; color: #8b949e;
    }
    .toggle {
      width: 36px; height: 20px; background: #30363d; border-radius: 10px;
      position: relative; cursor: pointer; transition: background 0.2s;
    }
    .toggle.active { background: #238636; }
    .toggle::after {
      content: ''; position: absolute; width: 16px; height: 16px;
      background: #fff; border-radius: 50%; top: 2px; left: 2px;
      transition: transform 0.2s;
    }
    .toggle.active::after { transform: translateX(16px); }
    .section-title {
      font-size: 11px; font-weight: 700; color: #58a6ff;
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
    }
    .empty { text-align: center; padding: 12px; color: #484f58; font-size: 12px; }
    .log {
      max-height: 80px; overflow-y: auto; font-size: 10px; color: #8b949e;
      font-family: 'Cascadia Code', 'Fira Code', monospace; padding: 8px;
      background: #0d1117; border-radius: 4px; border: 1px solid #21262d;
    }
    .log-entry { padding: 2px 0; }
    .log-ok { color: #3fb950; }
    .log-err { color: #f85149; }
    .footer { text-align: center; font-size: 10px; color: #484f58; margin-top: 8px; }
  </style>
</head>
<body>
  <h1><span class="icon">&#129513;</span> CaptchaSolver</h1>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-num ok" id="stat-solved">0</div>
      <div class="stat-label">Solved</div>
    </div>
    <div class="stat-box">
      <div class="stat-num err" id="stat-failed">0</div>
      <div class="stat-label">Failed</div>
    </div>
    <div class="stat-box">
      <div class="stat-num warn" id="stat-active">0</div>
      <div class="stat-label">Active</div>
    </div>
  </div>

  <div class="status">
    <div class="section-title">Server Status</div>
    <div id="server-status">
      <div class="status-row"><span class="status-label">Checking...</span></div>
    </div>
  </div>

  <div class="captchas">
    <div class="section-title">Detected Captchas</div>
    <div id="captcha-list">
      <div class="empty">No captchas detected on this page</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="btn-solve">&#9889; Solve All</button>
    <button class="btn btn-secondary" id="btn-detect">&#128269; Re-detect</button>
  </div>

  <div class="settings">
    <div class="section-title">Settings</div>
    <div class="setting-item">
      <label class="setting-label">Server URL</label>
      <input type="text" class="setting-input" id="cfg-url" placeholder="http://23.22.196.74:8855">
    </div>
    <div class="setting-item">
      <label class="setting-label">API Key</label>
      <input type="text" class="setting-input" id="cfg-key" placeholder="Your API key">
    </div>
    <div class="toggle-row">
      <span>Auto-solve</span>
      <div class="toggle active" id="cfg-auto"></div>
    </div>
    <div class="toggle-row">
      <span>reCAPTCHA</span>
      <div class="toggle active" id="cfg-recaptcha"></div>
    </div>
    <div class="toggle-row">
      <span>Turnstile</span>
      <div class="toggle active" id="cfg-turnstile"></div>
    </div>
    <div class="toggle-row">
      <span>hCaptcha</span>
      <div class="toggle active" id="cfg-hcaptcha"></div>
    </div>
    <div class="toggle-row">
      <span>Image OCR</span>
      <div class="toggle active" id="cfg-image"></div>
    </div>
    <div class="toggle-row">
      <span>xCaptcha</span>
      <div class="toggle active" id="cfg-xcaptcha"></div>
    </div>
    <div class="actions" style="margin-top:8px;margin-bottom:0;">
      <button class="btn btn-secondary" id="btn-save" style="flex:1">Save</button>
      <button class="btn btn-secondary" id="btn-test" style="flex:1">Test</button>
    </div>
  </div>

  <div class="log" id="log-output"></div>

  <div class="footer">CaptchaSolver v2.3 | Self-hosted AI + xCaptcha solvers</div>

  <script src="popup.js"></script>
</body>
</html>
